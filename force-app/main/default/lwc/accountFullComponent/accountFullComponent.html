<template>

    <lightning-card title="Account Management">

        <lightning-combobox
            label="Select Plan"
            value={plan}
            options={planOptions}
            onchange={handlePlan}
            disabled={isDisabled}>
        </lightning-combobox>

        <template if:true={plan}>
            <p class="slds-m-top_small">
                Selected Plan: <b>{plan}</b>
            </p>
        </template>

        <hr/>

        <lightning-button label="Add Record" variant="brand" onclick={openModal}></lightning-button>

        <lightning-datatable
            key-field="Id"
            data={records}
            columns={columns}
            onrowaction={handleRowAction}>
        </lightning-datatable>

    </lightning-card>

    <template if:true={isModal}>
        <section class="slds-modal slds-fade-in-open">
            <div class="slds-modal__container">

                <header class="slds-modal__header">
                    <h2>{title}</h2>
                </header>

                <div class="slds-modal__content slds-p-around_medium">

                
                    <lightning-input label="Name" value={name} onchange={handleName}></lightning-input>
                    <lightning-input label="Description" value={description} onchange={handleDesc}></lightning-input>

                    
                    <template if:true={isESOP}>
                        <lightning-input label="ESOP Amount" value={amount} onchange={handleAmount}></lightning-input>
                    </template>

                    <template if:true={isKSOP}>
                        <lightning-input label="KSOP Value" value={amount} onchange={handleAmount}></lightning-input>
                    </template>

                    <template if:true={isGSOP}>
                        <lightning-input label="GSOP Shares" value={amount} onchange={handleAmount}></lightning-input>
                    </template>

                    <template if:true={isMSOP}>
                        <lightning-input label="MSOP Units" value={amount} onchange={handleAmount}></lightning-input>
                    </template>

                
                    <lightning-combobox
                        label="Status"
                        value={status}
                        options={statusOptions}
                        onchange={handleStatus}>
                    </lightning-combobox>

                </div>

                <footer class="slds-modal__footer">
                    <lightning-button label="Cancel" onclick={closeModal} class="slds-p-around_medium"></lightning-button>
                    <lightning-button label="Save" variant="brand" onclick={save} class="slds-p-around_medium"></lightning-button>
                </footer>

            </div>
        </section>

        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>

</template>

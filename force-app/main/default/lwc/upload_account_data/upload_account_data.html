<template>
    <lightning-card title="Upload Account Excel File">

        <div class="slds-p-around_medium">

            <lightning-input
                type="file"
                label="Select Excel File"
                accept=".xlsx,.xls"
                onchange={handleFileUpload}>
            </lightning-input>

            <br/>

            <lightning-button
                label="Upload Accounts"
                variant="brand"
                onclick={createRecords}>
            </lightning-button>

            <template if:true={isLoading}>
                <br/><br/>
                <lightning-spinner
                    alternative-text="Loading"
                    size="medium">
                </lightning-spinner>
            </template>

        </div>

    </lightning-card>
</template>

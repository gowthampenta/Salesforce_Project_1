<template>

<section
    role="dialog"
    tabindex="-1"
    class="slds-modal slds-fade-in-open">

    <div class="slds-modal__container">

        <!-- HEADER -->

        <header class="slds-modal__header header-import">

            <div class="header-import">
            <lightning-button-icon
                icon-name="utility:upload"
                variant="bare"
                size="large"
                alternative-text="Import"
                onclick={handleClose}
                class="slds-m-around_x-small"
               > <!-- class="slds-modal__close" -->
            </lightning-button-icon>

            <h2 class="slds-text-heading_medium slds-text-weight_bold slds-m-around_x-small">
                Import Wizard
            </h2>
            </div>
            
            <div>
                <lightning-button-icon
                  icon-name="utility:close"
                  alternative-text="Close"
                  title="Close"
                  onclick={handleClose}>
                </lightning-button-icon>
            </div>


        </header>

        <!-- BODY -->

        <div class="slds-modal__content slds-p-around_large">

            <!-- Progress Path -->

            <lightning-progress-indicator
                current-step={currentStep}
                type="path">

                <lightning-progress-step
                    label="Choose Mode"
                    value="1">
                </lightning-progress-step>

                <lightning-progress-step
                    label="Select Source"
                    value="2">
                </lightning-progress-step>

                <lightning-progress-step
                    label="Target & Confirm"
                    value="3">
                </lightning-progress-step>

            </lightning-progress-indicator>

            <br/>

            <!-- STEP 1 -->

            <template if:true={isStep1}>

                <h3 class="slds-text-heading_small">
                    Choose Mode
                </h3>

                <br/>

                <lightning-radio-group
                    options={modeOptions}
                    value={selectedMode}
                    type="radio"
                    onchange={handleModeChange}>
                </lightning-radio-group>

            </template>

            <!-- STEP 2 -->

                 <!-- STEP 2 -->

<template if:true={isStep2}>

    <!-- ACTION SECTION -->

    <div class="sectionTitle">

        <span class="mainHeading">
            Choose an action
        </span>

        <lightning-helptext
            content="Choose an action to perform.">
        </lightning-helptext>

    </div>

    <div class="subHeading">
        Choose an action
    </div>

    <lightning-combobox
        value={selectedAction}
        options={actionOptions}
        onchange={handleAction}>
    </lightning-combobox>

    <br/><br/>

    <!-- SOURCE USER -->

    <div class="sectionTitle">

        <span class="mainHeading">
            Select the source user
        </span>

        <lightning-helptext
            content="Select the user whose records need to be updated.">
        </lightning-helptext>

    </div>

    <div class="subHeading">
        Select the user for update
    </div>

    <div class="lookupContainer">

        <lightning-input
            type="search"
            variant="label-hidden"
            placeholder="Search User"
            value={searchKey}
            onchange={handleSearch}>
        </lightning-input>

        <template if:true={users.length}>

            <div class="lookupBox">

                <template for:each={users} for:item="user">

                    <div
                        key={user.Id}
                        class="lookupItem"
                        data-id={user.Id}
                        data-name={user.Name}
                        onclick={selectUser}>

                        <lightning-icon
                            icon-name="standard:user"
                            size="xx-small">
                        </lightning-icon>

                        <span class="lookupName">

                            {user.Name}

                            <template if:true={user.Email}>
                                ({user.Email})
                            </template>

                        </span>

                    </div>

                </template>

            </div>

        </template>

    </div>

    <!-- USER CARD -->

    <template if:true={showUserSection}>

        <br/>

        <div class="userCard">

            <div class="userAvatar">

                <lightning-icon
                    icon-name="standard:user"
                    size="medium">
                </lightning-icon>

            </div>

            <div class="userDetails">

               <div>

                <div class="userTitle">
                    {userName}
                </div>

                <div class="userEmail">
                    {userEmail}
                </div>


               </div>
                <div class="initiativeCount">
                    {initiativeCount} Initiatives
                </div>

            </div>

        </div>

        <br/>

        <!-- INITIATIVE TABLE -->
        
        <div class="tableContainer">
        <lightning-datatable
            key-field="Id"
            data={initiatives}
            columns={columns}
            max-row-selection="1"
            onrowselection={handleInitiativeSelection}>
        </lightning-datatable>
        </div>

    </template>

    <!-- TEAM MEMBER ACTION -->

    <template if:true={showTeamMemberAction}>

        <br/><br/>

        <div class="sectionTitle">

            <span class="mainHeading">
                Team Member Action
            </span>

            <lightning-helptext
                content="Select an action for the team member.">
            </lightning-helptext>

        </div>

        <lightning-combobox
            label="Select Action"
            value={teamMemberAction}
            options={teamMemberOptions}
            onchange={handleTeamMemberAction}>
        </lightning-combobox>


       <template if:true={showTransferTable}> <!-- Transfer -->
       
       <div class="tableContainer">
       <lightning-datatable key-field="Id" data={teamMembers} columns={transferColumns} onrowaction={handleTransferRow}></lightning-datatable>
       </div>

       </template>


       <template if:true={showDeleteTable}>   <!-- Delete -->
      
       <div class="tableContainer">
       <lightning-datatable key-field="Id"  data={teamMembers}  columns={deleteColumns}   onrowaction={handleTransferRow}></lightning-datatable>
       </div>

      </template>

    </template>

    <!-- TARGET USER -->

        <template if:true={showTargetUserLookup}>

    <br/>

    <lightning-input
        type="search"
        label="Select User"
        value={targetUserSearch}
        onchange={handleTargetUserSearch}>
    </lightning-input>

    <!-- User Search Results -->

    <template if:true={targetUsers.length}>

        <div class="lookupBox">

            <template
                for:each={targetUsers}
                for:item="user">

                <div
                    key={user.Id}
                    class="lookupItem"
                    data-id={user.Id}
                    data-name={user.Name}
                    data-email={user.Email}
                    onclick={selectTargetUser}>

                    <lightning-icon
                        icon-name="standard:user"
                        size="xx-small">
                    </lightning-icon>

                    <span class="lookupName">

                        {user.Name}

                        <template if:true={user.Email}>
                            ({user.Email})
                        </template>

                    </span>

                </div>

            </template>

        </div>

    </template>

    <!-- Selected Target User Card -->

    <template if:true={selectedTargetUserId}>

        <div class="userCard slds-m-top_medium">

            <div class="userAvatar">

                <lightning-icon
                    icon-name="standard:user"
                    size="medium">
                </lightning-icon>

            </div>

            <div>

                <div class="userTitle">
                    {targetUserName}
                </div>

                <div class="userEmail">
                    {targetUserEmail}
                </div>

            </div>

        </div>

    </template>

</template>

    <!--

    <template if:true={showTargetUserLookup}>

        <br/>

        <lightning-input
            type="search"
            label="Select User"
            value={targetUserSearch}
            onchange={handleTargetUserSearch}>
        </lightning-input>

    </template>

    -->



    <!-- CONFIRM BUTTON -->

    <template if:true={showConfirmAddButton}>

        <br/>

        <lightning-button
            variant="brand"
            label="Confirm Add"
            onclick={openAddTeamMemberModal}>
        </lightning-button>

    </template>

</template>

            <!-- STEP 3 -->

            <template if:true={isStep3}>

                <h3 class="slds-text-heading_small">
                    Confirmation
                </h3>

                <br/>

                <p>
                    Source User :
                    Gowtam P
                </p>

                <p>
                    Records Found :
                    250
                </p>

            </template>

        </div>

        <!-- FOOTER -->
        
       <footer class="slds-modal__footer">

    <div class="slds-text-align_right">

        <!-- STEP 1 -->

        <template if:true={isStep1}>

           <lightning-button
                 variant="brand"
                 label="Continue"
                 disabled={disableContinueStep1}
                 onclick={handleContinue}>
           </lightning-button>

            <lightning-button
                label="Cancel"
                class="slds-m-left_small"
                onclick={handleClose}>
            </lightning-button>

        </template>

        <!-- STEP 2 -->

        <template if:true={isStep2}>

            <lightning-button
                label="Back"
                onclick={handleBack}>
            </lightning-button>

            <lightning-button
                variant="brand"
                 label="Continue"
                 class="slds-m-left_small"
                 disabled={disableContinueStep2}
                 onclick={handleContinue}>
            </lightning-button>

        </template>

        <!-- STEP 3 -->

        <template if:true={isStep3}>

            <lightning-button
                label="Back"
                onclick={handleBack}>
            </lightning-button>

            <lightning-button
                variant="brand"
                label="Finish"
                class="slds-m-left_small"     
                onclick={handleFinish}
            >
                
            </lightning-button>

        </template>

    </div>

</footer>

        <!--

        <footer class="slds-modal__footer">

            <template if:true={showPrevious}>

                <lightning-button
                    label="Previous"
                    onclick={handlePrevious}>
                </lightning-button>

            </template>

            <template if:true={showNext}>

                <lightning-button
                    variant="brand"
                    label="Next"
                    onclick={handleNext}>
                </lightning-button>

            </template>

            <template if:true={showFinish}>

                <lightning-button
                    variant="brand"
                    label="Finish">
                </lightning-button>

            </template>

        </footer>

        -->

    </div>

    

    <template if:true={showAddModal}>

    <section
        role="dialog"
        tabindex="-1"
        class="slds-modal slds-fade-in-open">

        <div class="slds-modal__container">

            <header class="slds-modal__header">

                <h2 class="slds-text-heading_medium">
                    Add Team Member
                </h2>

            </header>

            <div class="slds-modal__content slds-p-around_medium">

                <!--

                <lightning-input
                    label="Selected User"
                    value={userName}
                    disabled>
                </lightning-input>

                -->

                  <lightning-input label="Team Member" value={targetUserName} disabled></lightning-input>

                  <lightning-input   label="Email"  value={targetUserEmail}   disabled></lightning-input>

                <br/>

                <lightning-input label="Initiative"  value={selectedInitiativeName}   disabled></lightning-input>
                <br/>

                <lightning-combobox
                    label="Discipline"
                    value={discipline}
                    options={disciplineOptions}
                    onchange={handleDiscipline}>
                </lightning-combobox>

                <br/>

                <lightning-input
                    type="number"
                    label="Resource Time Allocation (%)"
                    value={allocation}
                    onchange={handleAllocation}>
                </lightning-input>

            </div>

            <footer class="slds-modal__footer">

                <lightning-button
                    label="Cancel"
                    onclick={closeAddModal}>
                </lightning-button>

                <lightning-button
                    variant="brand"
                    label="Save"
                    class="slds-m-left_small"
                    onclick={saveTeamMember}>
                </lightning-button>

            </footer>

        </div>

    </section>

    <div class="slds-backdrop slds-backdrop_open"></div>

</template>


<template if:true={showTransferPopup}>

    <section
        role="dialog"
        tabindex="-1"
        class="slds-modal slds-fade-in-open">

        <div class="slds-modal__container">

            <header class="slds-modal__header">

                <h2 class="slds-text-heading_medium">

                    Transfer Team Member

                </h2>

            </header>

            <div class="slds-modal__content slds-p-around_medium">

                <lightning-input
                    label="New User"
                    value={transferUserSearch}
                    onchange={handleTransferUserSearch}>
                </lightning-input>

                <template if:true={transferUsers.length}>

                    <div class="lookupBox">

                        <template
                            for:each={transferUsers}
                            for:item="user">

                            <div
                                key={user.Id}
                                class="lookupItem"
                                data-id={user.Id}
                                data-name={user.Name}
                                data-email={user.Email}
                                onclick={selectTransferUser}>

                                {user.Name}

                            </div>

                        </template>

                    </div>

                </template>

                <template if:true={newTransferUserId}>

                    <div class="userCard slds-m-top_medium">

                        <div>

                            <div class="userTitle">
                                {newTransferUserName}
                            </div>

                            <div class="userEmail">
                                {newTransferUserEmail}
                            </div>

                        </div>

                    </div>

                </template>

            </div>

            <footer class="slds-modal__footer">

                <lightning-button
                    label="Cancel"
                    onclick={closeTransferPopup}>
                </lightning-button>

                <lightning-button
                    variant="brand"
                    label="Transfer"
                    class="slds-m-left_small"
                    onclick={confirmTransfer}>
                </lightning-button>

            </footer>

        </div>

    </section>

    <div class="slds-backdrop slds-backdrop_open"></div>

</template>










</section>



<div class="slds-backdrop slds-backdrop_open"></div>

</template>

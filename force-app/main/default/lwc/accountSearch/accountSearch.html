<template>
    <lightning-card title="Account Search">

        <div class="slds-p-around_medium">
            <lightning-input 
                type="text" 
                label="Search Account"
                value={searchKey}
                onchange={handleSearchChange}>
            </lightning-input>
        </div>

        <template if:true={accounts}>
            <lightning-datatable
                key-field="Id"
                data={accounts}
                columns={columns}>
            </lightning-datatable>
        </template>

    </lightning-card>
</template>
